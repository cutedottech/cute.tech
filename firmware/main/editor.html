<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>cute.tech editor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/dracula.min.css">
  <style>
    :root {
      --bg:        #0f0a1a;
      --panel:     #1a0f2e;
      --panel-2:   #241638;
      --accent:    #7b4fd4;
      --accent-lt: #c4a0ff;
      --text:      #e8d5ff;
      --muted:     #8a78b0;
      --border:    #3a2a5c;
      --ok:        #6ee787;
      --warn:      #ffcf5c;
      --err:       #ff6b8a;
      --ui-font:   ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    }
    * , *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--ui-font);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── top bar ─────────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.7rem 1rem;
      background: var(--panel);
      border-bottom: 2px solid var(--accent);
      flex: 0 0 auto;
    }
    .brand {
      font-family: 'Press Start 2P', monospace;
      font-size: 0.7rem;
      color: var(--accent-lt);
      white-space: nowrap;
    }
    .filename {
      font-size: 0.8rem;
      color: var(--muted);
      flex: 1 1 auto;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .filename b { color: var(--text); }
    .status {
      display: flex;
      align-items: center;
      gap: 0.45rem;
      font-size: 0.7rem;
      color: var(--muted);
      white-space: nowrap;
    }
    .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--muted); }
    .dot.ok   { background: var(--ok); }
    .dot.warn { background: var(--warn); }
    .dot.err  { background: var(--err); }
    .dot.busy { background: var(--accent-lt); animation: pulse 0.9s infinite; }
    @keyframes pulse { 50% { opacity: 0.3; } }

    button {
      font-family: var(--ui-font);
      font-size: 0.72rem;
      color: var(--text);
      background: var(--accent);
      border: none;
      border-radius: 4px;
      padding: 0.45rem 0.8rem;
      cursor: pointer;
    }
    button:hover { background: var(--accent-lt); color: var(--bg); }
    button:disabled { opacity: 0.4; cursor: default; }
    button.ghost { background: transparent; border: 1px solid var(--border); color: var(--muted); }
    button.ghost:hover { background: var(--panel-2); color: var(--text); }

    /* ── main split ──────────────────────────────────────── */
    main { flex: 1 1 auto; display: flex; min-height: 0; }

    .sidebar {
      width: 240px;
      flex: 0 0 auto;
      background: var(--panel);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    .sidebar-head {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.6rem 0.7rem;
      border-bottom: 1px solid var(--border);
      flex: 0 0 auto;
    }
    .sidebar-head .label {
      font-size: 0.62rem;
      letter-spacing: 0.1em;
      color: var(--muted);
      text-transform: uppercase;
      flex: 1;
    }
    .sidebar-head button { padding: 0.25rem 0.45rem; font-size: 0.8rem; line-height: 1; }

    .tree { flex: 1 1 auto; overflow-y: auto; padding: 0.4rem 0; }
    .node {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.28rem 0.6rem;
      font-size: 0.74rem;
      cursor: pointer;
      white-space: nowrap;
      color: var(--text);
      border: none;
      background: none;
      width: 100%;
      text-align: left;
    }
    .node:hover { background: var(--panel-2); }
    .node.active { background: var(--accent); color: #fff; }
    .node .caret { width: 0.8rem; color: var(--muted); font-size: 0.6rem; }
    .node.file .caret { visibility: hidden; }
    .node .icon { opacity: 0.85; }
    .node .name { overflow: hidden; text-overflow: ellipsis; flex: 1; }
    .node .del {
      visibility: hidden;
      color: var(--muted);
      font-size: 0.8rem;
      padding: 0 0.2rem;
    }
    .node:hover .del { visibility: visible; }
    .node .del:hover { color: var(--err); }
    .tree-empty { padding: 1rem 0.7rem; font-size: 0.68rem; color: var(--muted); line-height: 1.8; }

    /* ── editor ──────────────────────────────────────────── */
    .editor-wrap { flex: 1 1 auto; min-width: 0; position: relative; display: flex; }
    .CodeMirror {
      height: 100%;
      width: 100%;
      font-family: var(--ui-font);
      font-size: 13px;
      line-height: 1.5;
    }
    .placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 0.8rem;
      text-align: center;
      pointer-events: none;
      padding: 2rem;
    }
    .hidden { display: none !important; }

    .toast {
      position: fixed;
      bottom: 1rem;
      left: 50%;
      transform: translateX(-50%);
      background: var(--panel-2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.5rem 0.9rem;
      border-radius: 4px;
      font-size: 0.72rem;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
    }
    .toast.show { opacity: 1; }
    .toast.err { border-color: var(--err); color: var(--err); }
  </style>
</head>
<body>
  <header>
    <span class="brand">cute.tech</span>
    <span class="filename" id="filename">no file open</span>
    <span class="status"><span class="dot" id="dot"></span><span id="status">ready</span></span>
    <button id="save-btn" disabled>save</button>
    <a href="/" target="_blank"><button class="ghost">view site ↗</button></a>
  </header>

  <main>
    <aside class="sidebar">
      <div class="sidebar-head">
        <span class="label">files</span>
        <button class="ghost" id="new-file"   title="new file">＋</button>
        <button class="ghost" id="new-folder" title="new folder">▣</button>
        <button class="ghost" id="refresh"    title="refresh">↻</button>
      </div>
      <div class="tree" id="tree"></div>
    </aside>

    <div class="editor-wrap">
      <textarea id="code"></textarea>
      <div class="placeholder" id="placeholder">select a file from the sidebar,<br>or create a new one with ＋</div>
    </div>
  </main>

  <div class="toast" id="toast"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/xml/xml.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/javascript/javascript.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/css/css.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/htmlmixed/htmlmixed.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/closebrackets.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/matchbrackets.min.js"></script>
  <script>
  (function () {
    "use strict";

    var currentPath = null;
    var dirty = false;
    var loading = false;   // suppress dirty flag while loading a file
    var expanded = {};     // folder path -> open/closed

    var els = {
      tree:        document.getElementById("tree"),
      filename:    document.getElementById("filename"),
      status:      document.getElementById("status"),
      dot:         document.getElementById("dot"),
      save:        document.getElementById("save-btn"),
      placeholder: document.getElementById("placeholder"),
      toast:       document.getElementById("toast"),
    };

    var cm = CodeMirror.fromTextArea(document.getElementById("code"), {
      theme: "dracula",
      lineNumbers: true,
      lineWrapping: true,
      autoCloseBrackets: true,
      matchBrackets: true,
      indentUnit: 2,
      tabSize: 2,
    });
    cm.setSize("100%", "100%");
    cm.on("change", function () {
      if (loading) return;
      if (!dirty) { dirty = true; setStatus("unsaved changes", "warn"); }
      els.save.disabled = false;
    });

    // ── status + toast ───────────────────────────────────
    function setStatus(text, kind) {
      els.status.textContent = text;
      els.dot.className = "dot" + (kind ? " " + kind : "");
    }
    var toastTimer;
    function toast(msg, isErr) {
      els.toast.textContent = msg;
      els.toast.className = "toast show" + (isErr ? " err" : "");
      clearTimeout(toastTimer);
      toastTimer = setTimeout(function () { els.toast.className = "toast"; }, 2600);
    }

    // ── path / mode helpers ──────────────────────────────
    function modeFor(path) {
      var ext = (path.split(".").pop() || "").toLowerCase();
      if (ext === "html" || ext === "htm") return "htmlmixed";
      if (ext === "css")  return "css";
      if (ext === "js")   return "javascript";
      if (ext === "json") return { name: "javascript", json: true };
      return null;
    }
    function basename(path) { return path.split("/").filter(Boolean).pop() || path; }
    function validPath(p) {
      return /^\/[A-Za-z0-9._\-\/]+$/.test(p) && p.indexOf("..") === -1 && !/\/$/.test(p);
    }

    // ── API ──────────────────────────────────────────────
    function api(method, url, body) {
      return fetch(url, { method: method, body: body }).then(function (r) {
        if (!r.ok) return r.text().then(function (t) { throw new Error(t || r.status); });
        return r;
      });
    }

    function loadTree(selectAfter) {
      return api("GET", "/api/files").then(function (r) { return r.json(); })
        .then(function (list) {
          renderTree(list);
          if (selectAfter) openFile(selectAfter);
        })
        .catch(function (e) { toast("couldn't load files: " + e.message, true); });
    }

    function openFile(path) {
      if (path === currentPath) return;
      if (dirty && !confirm("Discard unsaved changes to " + basename(currentPath) + "?")) return;
      setStatus("loading…", "busy");
      api("GET", "/api/file?path=" + encodeURIComponent(path)).then(function (r) { return r.text(); })
        .then(function (text) {
          loading = true;
          cm.setOption("mode", modeFor(path));
          cm.setValue(text);
          cm.clearHistory();
          loading = false;
          currentPath = path;
          dirty = false;
          els.save.disabled = true;
          els.placeholder.classList.add("hidden");
          els.filename.innerHTML = "<b>" + basename(path) + "</b> " + path;
          setStatus("saved", "ok");
          markActive();
          cm.focus();
        })
        .catch(function (e) { setStatus("error", "err"); toast("open failed: " + e.message, true); });
    }

    function saveFile() {
      if (!currentPath || els.save.disabled) return;
      setStatus("saving…", "busy");
      api("PUT", "/api/file?path=" + encodeURIComponent(currentPath), cm.getValue())
        .then(function () {
          dirty = false;
          els.save.disabled = true;
          setStatus("saved", "ok");
          toast("saved " + basename(currentPath));
        })
        .catch(function (e) { setStatus("error", "err"); toast("save failed: " + e.message, true); });
    }

    function newFile() {
      var p = prompt("New file path (e.g. /styles/main.css):", "/new.html");
      if (!p) return;
      p = p.trim();
      if (!validPath(p)) { toast("invalid path", true); return; }
      api("PUT", "/api/file?path=" + encodeURIComponent(p), "")
        .then(function () { return loadTree(p); })
        .then(function () { toast("created " + basename(p)); })
        .catch(function (e) { toast("create failed: " + e.message, true); });
    }

    function newFolder() {
      var p = prompt("New folder path (e.g. /styles):", "/folder");
      if (!p) return;
      p = p.trim();
      if (!validPath(p)) { toast("invalid path", true); return; }
      expanded[p] = true;
      api("POST", "/api/mkdir?path=" + encodeURIComponent(p))
        .then(function () { return loadTree(); })
        .then(function () { toast("created " + basename(p) + "/"); })
        .catch(function (e) { toast("mkdir failed: " + e.message, true); });
    }

    function deleteEntry(path, isDir) {
      if (!confirm("Delete " + path + (isDir ? " and everything in it?" : "?"))) return;
      api("DELETE", "/api/file?path=" + encodeURIComponent(path))
        .then(function () {
          if (currentPath && (currentPath === path || currentPath.indexOf(path + "/") === 0)) {
            currentPath = null; dirty = false;
            loading = true; cm.setValue(""); loading = false;
            els.save.disabled = true;
            els.filename.textContent = "no file open";
            els.placeholder.classList.remove("hidden");
            setStatus("ready");
          }
          return loadTree();
        })
        .then(function () { toast("deleted " + basename(path)); })
        .catch(function (e) { toast("delete failed: " + e.message, true); });
    }

    // ── file tree rendering ──────────────────────────────
    function buildTree(list) {
      var root = { dirs: {}, files: [] };
      list.forEach(function (item) {
        var parts = item.path.split("/").filter(Boolean);
        var node = root;
        for (var i = 0; i < parts.length - 1; i++) {
          node.dirs[parts[i]] = node.dirs[parts[i]] || { dirs: {}, files: [] };
          node = node.dirs[parts[i]];
        }
        var name = parts[parts.length - 1];
        if (item.type === "dir") node.dirs[name] = node.dirs[name] || { dirs: {}, files: [] };
        else node.files.push(name);
      });
      return root;
    }

    function renderTree(list) {
      els.tree.innerHTML = "";
      if (!list.length) {
        els.tree.innerHTML = '<div class="tree-empty">no files yet.<br>create one with ＋</div>';
        return;
      }
      var tree = buildTree(list);
      renderNode(tree, "", 0, els.tree);
    }

    function renderNode(node, prefix, depth, parent) {
      Object.keys(node.dirs).sort().forEach(function (name) {
        var path = prefix + "/" + name;
        var isOpen = expanded[path] !== false; // default open
        var row = makeRow({
          label: name, icon: isOpen ? "📂" : "📁", depth: depth,
          isDir: true, path: path, caret: isOpen ? "▾" : "▸",
        });
        row.addEventListener("click", function (e) {
          if (e.target.classList.contains("del")) return;
          expanded[path] = !isOpen;
          renderTree(lastList);
        });
        parent.appendChild(row);
        if (isOpen) renderNode(node.dirs[name], path, depth + 1, parent);
      });
      node.files.sort().forEach(function (name) {
        var path = prefix + "/" + name;
        var row = makeRow({
          label: name, icon: "📄", depth: depth, isDir: false, path: path, caret: "",
        });
        row.addEventListener("click", function (e) {
          if (e.target.classList.contains("del")) return;
          openFile(path);
        });
        parent.appendChild(row);
      });
    }

    function makeRow(o) {
      var row = document.createElement("div");
      row.className = "node " + (o.isDir ? "dir" : "file");
      row.dataset.path = o.path;
      row.style.paddingLeft = (0.6 + o.depth * 0.9) + "rem";
      row.innerHTML =
        '<span class="caret">' + o.caret + '</span>' +
        '<span class="icon">' + o.icon + '</span>' +
        '<span class="name"></span>' +
        '<span class="del" title="delete">✕</span>';
      row.querySelector(".name").textContent = o.label;
      row.querySelector(".del").addEventListener("click", function (e) {
        e.stopPropagation();
        deleteEntry(o.path, o.isDir);
      });
      return row;
    }

    function markActive() {
      var rows = els.tree.querySelectorAll(".node");
      for (var i = 0; i < rows.length; i++)
        rows[i].classList.toggle("active", rows[i].dataset.path === currentPath);
    }

    // keep a copy so folder toggles can re-render without refetching
    var lastList = [];
    var _renderTree = renderTree;
    renderTree = function (list) { lastList = list; _renderTree(list); markActive(); };

    // ── events ───────────────────────────────────────────
    els.save.addEventListener("click", saveFile);
    document.getElementById("new-file").addEventListener("click", newFile);
    document.getElementById("new-folder").addEventListener("click", newFolder);
    document.getElementById("refresh").addEventListener("click", function () { loadTree(); });

    document.addEventListener("keydown", function (e) {
      if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === "s") {
        e.preventDefault();
        saveFile();
      }
    });
    window.addEventListener("beforeunload", function (e) {
      if (dirty) { e.preventDefault(); e.returnValue = ""; }
    });

    // ── boot: load tree, auto-open index.html if present ──
    api("GET", "/api/files").then(function (r) { return r.json(); })
      .then(function (list) {
        renderTree(list);
        var hasIndex = list.some(function (i) { return i.path === "/index.html"; });
        if (hasIndex) openFile("/index.html");
      })
      .catch(function (e) { toast("couldn't load files: " + e.message, true); });
  })();
  </script>
</body>
</html>

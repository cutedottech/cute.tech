<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>cute.tech device</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background-color: #0f0a1a;
      background-image: radial-gradient(circle, #2a1a4a 1px, transparent 1px);
      background-size: 16px 16px;
      font-family: 'Press Start 2P', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem 1rem;
      gap: 2rem;
      color: #e8d5ff;
    }

    h1 { font-size: 1.2rem; color: #c4a0ff; text-align: center; line-height: 1.8; }

    .card {
      background: #1a0f2e;
      border: 3px solid #7b4fd4;
      border-radius: 4px;
      padding: 1.5rem;
      max-width: 480px;
      width: 100%;
      box-shadow: 6px 6px 0 #7b4fd4;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    p { font-size: 0.55rem; line-height: 2; color: #b89ee0; }

    a { color: #c4a0ff; }

    .edit-link {
      font-size: 0.45rem;
      color: #7b4fd4;
      text-align: center;
      text-decoration: none;
    }
    .edit-link:hover { color: #c4a0ff; }
  </style>
</head>
<body>
  <h1>hello from<br>cute.tech ✦</h1>
  <div class="card">
    <p>this page is served from an ESP32-S3 microcontroller.</p>
    <p>visit <a href="/edit">/edit</a> to make it yours.</p>
  </div>
  <a class="edit-link" href="/edit">edit this page →</a>
</body>
</html>

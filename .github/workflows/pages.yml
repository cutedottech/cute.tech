# Publish web/ as the GitHub Pages site (cute.tech).
# Branch-based Pages can only serve / or /docs, so the /web folder
# has to go through the Actions deployment path instead.
# Requires: Settings → Pages → Source = "GitHub Actions".
# Custom domain lives in repo settings too — the web/CNAME file is
# ignored by Actions deploys.
name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web
      # deploy-pages intermittently fails with "Deployment failed, try again
      # later" — give each push a second attempt before calling it failed.
      - id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true
      - id: deployment-retry
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4
